<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Koral Hub</title>
    <!-- Apply the saved theme before first paint so there is no dark→light flash on load. -->
    <script>
      document.documentElement.dataset.theme =
        localStorage.getItem("koral-theme") === "light" ? "light" : "dark";
    </script>
    <!-- Splash styles live inline so the loading screen paints on the very first frame, before
         the app's stylesheet or JS have loaded. The app removes #boot-splash once it's ready. -->
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at center, rgba(228, 106, 53, 0.12), transparent 62%),
          #161513;
        transition: opacity 420ms ease, visibility 420ms ease;
      }
      :root[data-theme="light"] #boot-splash {
        background: radial-gradient(circle at center, rgba(228, 106, 53, 0.12), transparent 62%),
          #f4f2ef;
      }
      #boot-splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      /* The PNG carries its own alpha (rounded transparent corners), so it composites over the
         backdrop; the opacity pulse is itself an alpha-blend animation. */
      #boot-splash img {
        width: 160px;
        height: 160px;
        filter: drop-shadow(0 14px 34px rgba(0, 0, 0, 0.4));
        animation: boot-pulse 1.6s ease-in-out infinite;
      }
      @keyframes boot-pulse {
        0%,
        100% {
          opacity: 0.5;
          transform: scale(0.96);
        }
        50% {
          opacity: 1;
          transform: scale(1.03);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash img {
          animation: none;
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-splash"><img src="/splash-logo.png" alt="Koral Hub" /></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
