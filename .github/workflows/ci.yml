name: CI

# Builds the app on every push to master and on PRs targeting it. Two purposes:
#   1. Catch a broken build before you cut a release tag.
#   2. Seed the Rust dependency cache on the *default branch*. GitHub scopes Actions caches per ref
#      and a tag run can only restore caches from its own tag or from master — never from another
#      tag. The release workflow runs only on tags, so without this its Linux job always starts cold
#      ("No cache found"). Sharing `shared-key: linux` with that job lets it restore what we build
#      here, so tagged releases start warm.
#
# Linux only, to match the cache the release job needs. (macOS runners bill at ~10x, so the mac
# release stays cold for now; add a build-macos job with `shared-key: macos` if that's worth it.)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Only the latest commit on a branch/PR needs building; cancel superseded runs to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Same Tauri v2 Linux toolchain the release job installs, so the compiled artifacts match and
      # the cache is reusable there. No patchelf/file here since we don't build the AppImage.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            cmake

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Must match the release workflow's Linux job so that job restores this cache.
          shared-key: linux

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Compiles the full release binary (same profile the release job bundles) but skips packaging,
      # so the dependency crates land in the cache without spending time on .deb/.rpm/AppImage.
      - name: Build (no bundle)
        run: pnpm tauri build --no-bundle
