name: Release

# Cut a release by pushing a tag like `v0.1.0`: this builds the Linux bundles
# (.deb, .rpm, AppImage), the macOS bundle (a universal .dmg + .app) and the Windows
# installers (.msi + NSIS .exe), and attaches them all to a *draft* GitHub Release for
# that tag, which you then review and publish.
#
# Also runnable from the Actions tab (workflow_dispatch), where the three inputs are
# independent — *what* to build, *where* to put it, and *which* platforms:
#   - "ref" is the code to build. Blank = the branch the run was started from.
#   - "tag" is the release to attach the bundles to. Blank = a dry run drafting a
#     release named after the ref. Naming an existing release appends to it, replacing
#     any same-named assets already there and leaving its draft/prerelease state alone.
#   - "platforms" restricts which build jobs run.
#
# Together those cover backfilling a platform onto an older release (ref + tag both set
# to that tag) and re-cutting one platform's bundles from newer code (ref = branch,
# tag = the release). Note the second case leaves that platform's binaries ahead of what
# the tag points at, which is only reasonable for a fix that platform alone needs.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag or SHA to build. Blank = the branch this run was started from."
        required: false
        default: ""
      tag:
        description: "Release tag to attach the bundles to (e.g. v0.1.0). Blank = dry run named after the ref."
        required: false
        default: ""
      platforms:
        description: "Which platforms to build"
        required: false
        type: choice
        default: all
        options: [all, linux, macos, windows]

permissions:
  contents: write # tauri-action creates the GitHub Release and uploads the bundles to it

jobs:
  # Resolve the ref and tag once, so the build jobs agree on them and a tag push (where the
  # dispatch inputs are absent) falls back to behaving exactly as it always has.
  meta:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - id: resolve
        run: |
          REF="${{ github.event.inputs.ref }}"
          [ -z "$REF" ] && REF="${{ github.ref_name }}"
          TAG="${{ github.event.inputs.tag }}"
          [ -z "$TAG" ] && TAG="${{ github.ref_name }}"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  release-linux:
    needs: meta
    # The input is null on a tag push, which falls through to "all" — a tag builds everything.
    if: ${{ contains(fromJSON('["all", "linux"]'), github.event.inputs.platforms || 'all') }}
    # Self-hosted Linux builder (label `koral-linux`). Note: unlike the old ubuntu-22.04 runner,
    # this box builds against its own glibc, so the AppImage's minimum-glibc floor is whatever this
    # machine ships — keep it on an older base if broad compatibility matters.
    runs-on: [self-hosted, linux, koral-linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.ref }}

      # Tauri v2's Linux webview + bundling toolchain. webkit2gtk-4.1 is the v2 webview;
      # patchelf + file are needed to build the AppImage. libgit2 and OpenSSL are vendored by
      # Cargo, so only a C toolchain + cmake (to compile them) are required, not system copies.
      #
      # Guarded on apt-get so a non-Debian self-hosted runner doesn't fail here: on Ubuntu/Debian it
      # installs the toolchain; elsewhere it assumes the equivalents are already present on the box.
      - name: Install system dependencies
        run: |
          if command -v apt-get >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y \
              libwebkit2gtk-4.1-dev \
              libgtk-3-dev \
              libayatana-appindicator3-dev \
              librsvg2-dev \
              patchelf \
              file \
              build-essential \
              cmake \
              curl \
              wget
          else
            echo "apt-get not found — assuming build dependencies are pre-installed on this self-hosted runner."
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11 requires Node >= 22.13 (it uses the node:sqlite built-in), so Node 20 crashes.
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Stable key (not the per-job default) so the CI workflow's master build seeds a cache
          # this tag-triggered job can restore — tag runs can only read their own ref or master.
          shared-key: linux

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build bundles and draft the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GitHub runners have no FUSE, so linuxdeploy (itself an AppImage) has to self-extract;
          # NO_STRIP avoids its strip step choking on the bundle. Both were needed to build the
          # AppImage locally, too.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
        with:
          tagName: ${{ needs.meta.outputs.tag }}
          releaseName: "Koral Hub ${{ needs.meta.outputs.tag }}"
          releaseDraft: true
          prerelease: false
          args: "--bundles deb,rpm,appimage"

  release-macos:
    needs: meta
    if: ${{ contains(fromJSON('["all", "macos"]'), github.event.inputs.platforms || 'all') }}
    # macos-14 is Apple Silicon. The universal-apple-darwin target cross-compiles the x86_64
    # slice as well, so the single .dmg runs on both Apple Silicon and Intel Macs.
    #
    # Note: the app is *unsigned* (no Apple Developer cert is available in CI), so on first
    # launch macOS Gatekeeper will warn. Users open it via right-click -> Open, or:
    #   xattr -dr com.apple.quarantine "/Applications/Koral Hub.app"
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: macos

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the universal macOS bundle and attach it to the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.meta.outputs.tag }}
          releaseName: "Koral Hub ${{ needs.meta.outputs.tag }}"
          # If the release already exists (e.g. backfilling v0.1.0) tauri-action just appends the
          # macOS assets and leaves its existing draft/prerelease state untouched.
          releaseDraft: true
          prerelease: false
          args: "--target universal-apple-darwin"

  release-windows:
    needs: meta
    if: ${{ contains(fromJSON('["all", "windows"]'), github.event.inputs.platforms || 'all') }}
    # Note: the installers are *unsigned* (no code-signing cert in CI), so SmartScreen shows a
    # "Windows protected your PC" prompt on first run. Users click More info -> Run anyway.
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.ref }}

      # No system-dependency step: WebView2 ships with Windows 10/11 (and tauri-action's bundler
      # embeds a bootstrapper for older machines), and the runner already has MSVC and cmake for
      # the vendored libgit2. git2 uses WinHTTP here rather than OpenSSL, so nothing to build there.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: windows

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the Windows installers and attach them to the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.meta.outputs.tag }}
          releaseName: "Koral Hub ${{ needs.meta.outputs.tag }}"
          releaseDraft: true
          prerelease: false
          # Both installer flavours: .msi for managed/enterprise deploys, NSIS .exe for the
          # ordinary double-click install.
          args: "--bundles msi,nsis"
